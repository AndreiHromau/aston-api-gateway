server:
  port: ${GATEWAY_PORT:8082}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:aston-api-gateway}
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://${USER_SERVICE_ID:user-service}
          predicates:
            - Path=/api/users/**
        - id: notification-service
          uri: lb://${NOTIFICATION_SERVICE_ID:notification-service}
          predicates:
            - Path=/api/notifications/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info
